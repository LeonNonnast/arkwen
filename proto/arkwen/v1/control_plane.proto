// Arkwen wire contract — OUTER-LOOP CONTRACT PLANE (ADR-008 / ADR-010).
//
// The public, versioned, CONSUMER-AGNOSTIC surface over which ANY outer loop
// drives and observes Arkwen. There is deliberately NO consumer name, no
// callback/webhook, no consumer_*_url anywhere: the dependency is strictly
// one-way (consumer -> Arkwen), Invariant 10. Arkwen never calls out.
//
// Two planes, no new mechanism (ADR-008 E2):
//   ReadPlane    — subscribe/replay the event stream + get_projection.
//   CommandPlane — enqueue + signal(cancel MUST / pause|resume KANN) +
//                  resolve_gate + reprioritize + set_floor.
//
// EVERY command corresponds to exactly one control event (ADR-008 E7). The outer
// loop may make Arkwen STRICTER, never looser (Invariant 10); a RunSpec that
// loosens the floor or forces auto-downgrade is REJECTED at enqueue, never
// silently corrected (ADR-008 E3 / ADR-010 E6).

syntax = "proto3";

package arkwen.v1;

import "arkwen/v1/common.proto";
import "arkwen/v1/events.proto";

option go_package = "github.com/arkwen/arkwen/gen/go/arkwen/v1;arkwenv1";

// ============================================================================
// Read-Plane (ADR-008 E2). Pull-based: the durable stream is the truth, so
// consumer lag NEVER blocks execution (E1/E6). Requires an authenticated
// principal with runs:read (ADR-010 E3); a pure observer needs no command grant.
// ============================================================================
service ReadPlane {
  // Subscribe/replay the append-only event stream from from_seq. Delivery is
  // at-least-once + seq-idempotent + replayable + durable fan-out, with NO
  // consumer backpressure on the execution (ADR-008 E6). Read-only: nothing here
  // mutates truth (Invariant 2).
  rpc Subscribe(SubscribeRequest) returns (stream EventEnvelope);

  // Get a folded projection (ADR-003 + ADR-008). Reuses the shared projection
  // shapes from common.proto.
  rpc GetProjection(GetProjectionRequest) returns (GetProjectionResponse);
}

message SubscribeRequest {
  string run_id = 1;
  uint64 from_seq = 2; // replay point; omit/0 = from the beginning
}

enum ProjectionKind {
  PROJECTION_KIND_UNSPECIFIED = 0; // reject
  PROJECTION_KIND_STATUS = 1;
  PROJECTION_KIND_ARTIFACT_MANIFEST = 2;
  PROJECTION_KIND_WORKBENCH_DIFF = 3;
  PROJECTION_KIND_RUN_SUMMARY = 4;
  PROJECTION_KIND_RUN_METRICS = 5; // best-effort, tier-degrading (ADR-008 E4)
}

message GetProjectionRequest {
  string run_id = 1;
  ProjectionKind kind = 2;
}

// The projection value, keyed by kind. Missing signals are absent, never
// fabricated (ADR-008 E4). `as_of_seq` ties the projection to a stream position.
message GetProjectionResponse {
  uint64 as_of_seq = 1;
  oneof projection {
    LifecycleStatus status = 2;
    ArtifactManifest artifact_manifest = 3;
    WorkbenchDiff workbench_diff = 4;
    RunSummary run_summary = 5;
    RunMetrics run_metrics = 6;
  }
}

// ============================================================================
// Command-Plane (ADR-008 E2/E7). Every op is authenticated (ADR-010) and becomes
// exactly one control event. Queue ordering stays a projection (Invariant 2).
// ============================================================================
service CommandPlane {
  // enqueue -> run.created. Idempotent by idempotency_key (ADR-008 E6). This is
  // where the intrinsic floor AND AuthZ are enforced: a RunSpec that loosens a
  // gate/isolation floor or forces auto-downgrade is REJECTED (ADR-008 E3 /
  // ADR-009 R3 / ADR-010 E6), never silently corrected. Requires runs:enqueue.
  rpc Enqueue(EnqueueRequest) returns (EnqueueResponse);

  // signal(cancel) -> run.cancel_requested [MUST];
  // signal(pause)  -> run.paused  [KANN control.pause_resume];
  // signal(resume) -> run.resumed [KANN] (may carry a cost-budget topup, R5).
  rpc Signal(SignalRequest) returns (SignalResponse);

  // resolve_gate -> gate.resolved (ADR-005 E3). Callback-free: the consumer saw
  // gate.requested via Subscribe and sends the resolution here. Requires
  // gates:resolve (a distinct high-trust grant, ADR-010 E3).
  rpc ResolveGate(ResolveGateRequest) returns (ResolveGateResponse);

  // reprioritize -> run.reprioritized (ADR-008 E7). Only meaningful while queued;
  // does NOT change inputs (ADR-009 R1). Requires runs:reprioritize.
  rpc Reprioritize(ReprioritizeRequest) returns (ReprioritizeResponse);

  // set_floor (ADR-010 E3). Sets ONLY the org floor, strictly ABOVE the
  // non-removable intrinsic Arkwen floor. NOT run-scoped -> recorded in the
  // Control-Plane audit ledger (FloorChanged), NOT the run stream. Requires the
  // distinct high-trust policy:set_floor grant.
  rpc SetFloor(SetFloorRequest) returns (SetFloorResponse);
}

// ---------------------------------------------------------------------------
// RunSpec & policy bundle
// ---------------------------------------------------------------------------

// Per-layer policy inputs (ADR-005 E4 / ADR-006 E7 / ADR-009 R3). Carries BOTH
// gate rules and the ADR-006 isolation DIMENSIONS. Composition is Org>Blueprint>
// Mission, stricter-only. Note: the intrinsic Arkwen floor is NOT a field here —
// it sits below all layers and is enforced by enqueue-reject (Invariant 7/10).
message PolicyLayer {
  PolicyLayerKind layer = 1;
  repeated GateRule gates = 2;   // gate policy for this layer (ADR-005)
  IsolationInputs isolation = 3; // isolation dimensions for this layer (ADR-006 / R3)
}

// Isolation-policy INPUTS pinned per layer (ADR-006 E7 / ADR-009 R2c). The
// Blueprint pins these inputs, NOT the finished contract. The composed result
// becomes RunSeed.isolation_contract_ref (profile=max, egress=∩, resource=min,
// image_trust=OR) at run.created — never set directly.
message IsolationInputs {
  IsolationProfile profile_floor = 1; // composed via max() across layers
  EgressPolicy egress = 2;            // composed via intersection
  ResourceLimits resource_ceiling = 3; // composed via min()
  ImageTrust image_trust = 4;         // composed via OR
}

// The full policy bundle (ADR-009 R3 generalized it from gate-only to full).
message PolicyBundle {
  PolicyLayer org = 1;       // the non-removable floor (governance-plane owner)
  PolicyLayer blueprint = 2; // may add, never loosen
  PolicyLayer mission = 3;   // may add, never loosen
}

// RunSpec — the enqueue payload. Consumer-agnostic (no consumer name/field,
// Invariant 10). tenant_id is MANDATORY (ADR-010 E2). version_constraint is a
// RANGE resolved against the Warehouse EXACTLY ONCE at run.created and frozen as
// seeds (ADR-008 E5 / ADR-009 R1) — never re-resolved.
message RunSpec {
  ContentRef mission_ref = 1;       // content-addressed, secret-free mission body (ADR-007)
  Digest blueprint_ref = 2;         // the pin-point (ADR-007 E3)
  string version_constraint = 3;    // range (e.g. "^3.2"); resolved once at run.created
  string tenant_id = 4;             // MANDATORY (ADR-010 E2)
  PolicyBundle policy_bundle = 5;   // gates + isolation dims per layer (R3)
  MaterializationMode materialization_mode = 6;
  string session_seed = 7;          // optional; consumer-providable (ADR-009 R1)
  int32 priority = 8;               // queue hint; ordering remains a projection (Invariant 2)
  map<string, string> labels = 9;   // run-scoping selectors (ADR-010 E4)
}

message EnqueueRequest {
  RunSpec run_spec = 1;
  string idempotency_key = 2; // ADR-008 E6: same key => same run_id
}

// On success, the run is created and frozen. On a floor/AuthZ violation the
// request is REJECTED (a gRPC error), and the denial is recorded ONLY in the
// Control-Plane audit ledger — it NEVER fabricates a run-stream event (ADR-010 E7,
// Invariant 2). A rejected enqueue therefore has no run_id.
message EnqueueResponse {
  string run_id = 1;
  uint64 created_seq = 2; // seq of the emitted run.created event
}

// ---------------------------------------------------------------------------
// Signal (command-plane) — distinct name from the adapter's ShimSignal.
// ---------------------------------------------------------------------------
enum SignalKind {
  SIGNAL_KIND_UNSPECIFIED = 0; // reject
  SIGNAL_KIND_CANCEL = 1;      // MUST -> run.cancel_requested
  SIGNAL_KIND_PAUSE = 2;       // KANN -> run.paused
  SIGNAL_KIND_RESUME = 3;      // KANN -> run.resumed
}

message SignalRequest {
  string run_id = 1;
  SignalKind signal = 2;
  CostBudget cost_budget_topup = 3; // R5: valid only on RESUME; raises cost budget, never org_cap
}

// The seq of the resulting control event — the command's durable footprint
// (Invariant 2: the command IS the event, no mutable shadow state).
message SignalResponse {
  uint64 event_seq = 1;
}

// ---------------------------------------------------------------------------
// ResolveGate -> gate.resolved
// ---------------------------------------------------------------------------
message ResolveGateRequest {
  string run_id = 1;
  string gate_id = 2;
  GateDecision decision = 3;
  string rationale = 4;                  // passes the redaction guard before persistence
  ContentRef resolution_payload_ref = 5; // approve_with_modification diff, pointer-only
}

message ResolveGateResponse {
  uint64 event_seq = 1;
}

// ---------------------------------------------------------------------------
// Reprioritize -> run.reprioritized (queued only)
// ---------------------------------------------------------------------------
message ReprioritizeRequest {
  string run_id = 1;
  int32 new_priority = 2;
}

message ReprioritizeResponse {
  uint64 event_seq = 1;
}

// ---------------------------------------------------------------------------
// SetFloor -> Control-Plane audit ledger FloorChanged (NOT a run event)
// ---------------------------------------------------------------------------
message SetFloorRequest {
  string tenant_id = 1;
  Digest new_floor_ref = 2; // content-addressed org floor; strictly above the intrinsic floor
}

message SetFloorResponse {
  uint64 ledger_seq = 1; // footprint in the Control-Plane audit ledger (ADR-010 E7)
}
